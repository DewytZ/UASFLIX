<!doctype html>
<html lang="es">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>UASFLIX</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header>
        <div class="logo">UASFLIX</div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Buscar película">
            <button onclick="searchMovie()">🔍</button>
        </div>
    </header>

    <nav>
        <button onclick="filterFaculty('informatica')">Informática</button>

        <button onclick="filterFaculty('derecho')">Derecho</button>
        
        <button onclick="showAll()">Todas</button>
    </nav>

    <div class="alphabet"></div>

    <div class="movies-grid" id="movies">
        </div>

    <script src="js/main.js"></script>

</body>
</html>
